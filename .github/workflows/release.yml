name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: Note-linux-x86_64.tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            name: Note-macos-aarch64.dmg
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: Note-windows-x86_64.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux Dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libx11-dev libxkbcommon-x11-dev libwayland-dev libxext-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build Release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package Linux
        if: runner.os == 'Linux'
        run: |
          cd target/${{ matrix.target }}/release
          tar czvf ../../../${{ matrix.name }} note

      - name: Package macOS
        if: runner.os == 'macOS'
        run: |
          brew install create-dmg
          mkdir -p dist/Note.app/Contents/MacOS
          cp target/${{ matrix.target }}/release/note dist/Note.app/Contents/MacOS/
          create-dmg \
            --volname "Note" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --hide-extension "Note.app" \
            --app-drop-link 400 185 \
            "${{ matrix.name }}" \
            "dist/"

      - name: Package Windows
        if: runner.os == 'Windows'
        run: |
          copy target\${{ matrix.target }}\release\note.exe ${{ matrix.name }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
